<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask Jesus</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A0806;--text:#FAF0DC;--gold:#D4AF55;--muted:#C8B89A;--dim:#8B7F6E;--deep:#4A4235}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'EB Garamond',serif;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:rgba(212,175,85,.2);border-radius:3px}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.03);opacity:1}}
@keyframes dotPulse{0%,80%,100%{transform:scale(.6);opacity:.3}40%{transform:scale(1);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.grain{position:fixed;inset:-50%;width:200%;height:200%;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:50}
.container{min-height:100vh;max-width:720px;margin:0 auto;padding:40px 20px 20px;display:flex;flex-direction:column;align-items:center;position:relative;z-index:10}
.video-wrap{position:relative;width:300px;height:420px;border-radius:12px;overflow:hidden;margin-bottom:36px;box-shadow:0 0 60px rgba(212,175,85,.2),0 0 120px rgba(212,175,85,.1);animation:breathe 6s ease-in-out infinite}
.video-wrap iframe{position:absolute;top:50%;left:50%;width:200%;height:200%;transform:translate(-50%,-50%);border:none;pointer-events:none}
.video-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,8,6,.4) 0%,transparent 25%,transparent 75%,rgba(10,8,6,.6) 100%),radial-gradient(ellipse at center,transparent 40%,rgba(10,8,6,.4) 100%);pointer-events:none;z-index:2}
.video-glow{position:absolute;top:-30px;left:-30px;right:-30px;bottom:-30px;border-radius:50%;background:radial-gradient(ellipse,rgba(212,175,85,.12) 0%,transparent 70%);filter:blur(20px);z-index:-1;animation:breathe 6s ease-in-out infinite}
.title{font-family:'Oswald',sans-serif;font-size:clamp(42px,8vw,64px);font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text);line-height:1;margin-bottom:8px}
.divider{width:60px;height:2px;margin:12px auto 16px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.subtitle{font-size:17px;color:var(--dim);font-style:italic;max-width:400px;line-height:1.6;margin-bottom:40px;text-align:center}
.chips{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:30px;max-width:500px}
.chip{padding:8px 16px;border-radius:20px;border:1px solid rgba(212,175,85,.2);background:rgba(212,175,85,.06);color:var(--muted);font-size:13px;font-family:'EB Garamond',serif;cursor:pointer;transition:all .3s;animation:fadeUp .8s ease-out both}
.chip:nth-child(1){animation-delay:.3s}.chip:nth-child(2){animation-delay:.4s}.chip:nth-child(3){animation-delay:.5s}.chip:nth-child(4){animation-delay:.6s}
.chip:hover{background:rgba(212,175,85,.15);border-color:rgba(212,175,85,.4);color:var(--text)}
.chat-header{display:flex;align-items:center;gap:12px;width:100%;padding:0 0 16px;border-bottom:1px solid rgba(212,175,85,.1);margin-bottom:16px}
.chat-icon{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#3D3425,#2A2318);border:1px solid rgba(212,175,85,.2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--gold);font-family:'Oswald',sans-serif;font-weight:600}
.chat-title{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text)}
.chat-subtitle{font-size:11px;color:#6B5F4E}
.new-btn{margin-left:auto;padding:6px 12px;border-radius:6px;border:1px solid rgba(212,175,85,.15);background:transparent;color:var(--dim);font-size:11px;font-family:'Oswald',sans-serif;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .3s}
.new-btn:hover{border-color:rgba(212,175,85,.3);color:var(--muted)}
.messages{width:100%;flex:1;overflow-y:auto;padding-bottom:8px}
.msg{display:flex;margin-bottom:16px;animation:fadeUp .4s ease-out}.msg.user{justify-content:flex-end}.msg.assistant{justify-content:flex-start}
.msg-bubble{max-width:85%;padding:14px 18px;font-size:15px;line-height:1.65;white-space:pre-wrap}
.msg.user .msg-bubble{border-radius:18px 18px 4px 18px;background:linear-gradient(135deg,#8B7355,#6B5A3E);color:var(--text)}
.msg.assistant .msg-bubble{border-radius:18px 18px 18px 4px;background:rgba(255,255,255,.04);border:1px solid rgba(212,175,85,.12);color:var(--muted)}
.msg-label{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:var(--gold);margin-bottom:6px;font-family:'Oswald',sans-serif}
.typing-dots{display:flex;gap:6px;align-items:center;padding:8px 0}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--gold)}
.typing-dot:nth-child(1){animation:dotPulse 1.4s ease-in-out infinite 0s}.typing-dot:nth-child(2){animation:dotPulse 1.4s ease-in-out infinite .2s}.typing-dot:nth-child(3){animation:dotPulse 1.4s ease-in-out infinite .4s}
.input-area{width:100%;position:sticky;bottom:0;padding-top:12px;background:linear-gradient(0deg,var(--bg) 80%,transparent)}
.input-wrap{display:flex;align-items:flex-end;gap:8px;padding:12px 16px;border-radius:16px;border:1px solid rgba(212,175,85,.15);background:rgba(255,255,255,.03);transition:border-color .3s}
.input-wrap:focus-within{border-color:rgba(212,175,85,.35)}
.input-wrap textarea{flex:1;background:transparent;border:none;color:var(--text);font-size:15px;font-family:'EB Garamond',serif;resize:none;line-height:1.5;max-height:120px;overflow-y:auto;outline:none}
.input-wrap textarea::placeholder{color:rgba(200,184,154,.4)}
.send-btn{width:38px;height:38px;border-radius:10px;border:none;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;cursor:pointer;transition:all .3s;background:linear-gradient(135deg,var(--gold),#8B7355);color:var(--bg)}
.send-btn:disabled{background:rgba(212,175,85,.1);color:#6B5F4E;cursor:default}
.disclaimer{text-align:center;font-size:10px;color:var(--deep);margin-top:8px;font-family:'Oswald',sans-serif;letter-spacing:.08em;text-transform:uppercase}
.back-link{position:fixed;top:16px;left:16px;z-index:60;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);text-decoration:none;transition:color .3s}
.back-link:hover{color:var(--gold)}
.hero{animation:fadeUp 1s ease-out;text-align:center;display:flex;flex-direction:column;align-items:center}
.hidden{display:none}
</style>
</head>
<body>
<div class="grain"></div>
<a href="/" class="back-link">&larr; Every Rock</a>
<div class="container">
  <div id="hero" class="hero">
    <div class="video-wrap">
      <div class="video-glow"></div>
      <iframe src="https://www.youtube.com/embed/wDFCBLUQj_g?autoplay=1&mute=1&loop=1&playlist=wDFCBLUQj_g&controls=0&showinfo=0&modestbranding=1&playsinline=1&rel=0&disablekb=1" allow="autoplay;encrypted-media" allowfullscreen></iframe>
      <div class="video-overlay"></div>
    </div>
    <h1 class="title">ASK JESUS</h1>
    <div class="divider"></div>
    <p class="subtitle">"Ask, and it shall be given you; seek, and ye shall find; knock, and it shall be opened unto you." &mdash; Matthew 7:7</p>
    <div class="chips">
      <button class="chip" onclick="useSuggestion(this)">What did Jesus say about fear?</button>
      <button class="chip" onclick="useSuggestion(this)">Is there life after death?</button>
      <button class="chip" onclick="useSuggestion(this)">What is the meaning of suffering?</button>
      <button class="chip" onclick="useSuggestion(this)">How do I forgive someone who hurt me?</button>
    </div>
  </div>
  <div id="chatHeader" class="chat-header hidden">
    <div class="chat-icon">&#10013;</div>
    <div><div class="chat-title">Ask Jesus</div><div class="chat-subtitle">Answering from Scripture</div></div>
    <button class="new-btn" onclick="resetChat()">New Question</button>
  </div>
  <div id="messages" class="messages hidden"></div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="inputBox" rows="1" placeholder="Ask anything..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#8593;</button>
    </div>
    <div class="disclaimer">All answers sourced from Scripture &middot; Not a replacement for prayer, church, or the Holy Spirit</div>
  </div>
</div>
<script>
let chatMessages=[],isLoading=false;
function useSuggestion(el){document.getElementById('inputBox').value=el.textContent;sendMessage()}
function resetChat(){chatMessages=[];document.getElementById('hero').classList.remove('hidden');document.getElementById('chatHeader').classList.add('hidden');document.getElementById('messages').classList.add('hidden');document.getElementById('messages').innerHTML=''}
function addMsg(role,content){const c=document.getElementById('messages'),w=document.createElement('div');w.className='msg '+role;const b=document.createElement('div');b.className='msg-bubble';if(role==='assistant'){b.innerHTML='<div class="msg-label">Scripture says</div>'+escapeHtml(content)}else{b.textContent=content}w.appendChild(b);c.appendChild(w);c.scrollTop=c.scrollHeight}
function addTyping(){const c=document.getElementById('messages'),w=document.createElement('div');w.className='msg assistant';w.id='typingMsg';const b=document.createElement('div');b.className='msg-bubble';b.innerHTML='<div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';w.appendChild(b);c.appendChild(w);c.scrollTop=c.scrollHeight}
function removeTyping(){const el=document.getElementById('typingMsg');if(el)el.remove()}
function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML.replace(/\n/g,'<br>')}
async function sendMessage(){const input=document.getElementById('inputBox'),text=input.value.trim();if(!text||isLoading)return;input.value='';input.style.height='auto';isLoading=true;document.getElementById('sendBtn').disabled=true;document.getElementById('hero').classList.add('hidden');document.getElementById('chatHeader').classList.remove('hidden');document.getElementById('messages').classList.remove('hidden');addMsg('user',text);chatMessages.push({role:'user',content:text});addTyping();try{const res=await fetch('/api/ask-jesus',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:chatMessages})});const data=await res.json();const reply=data.content?.[0]?.text||data.response||data.reply||'I could not find an answer. Please try again.';removeTyping();addMsg('assistant',reply);chatMessages.push({role:'assistant',content:reply})}catch(err){removeTyping();addMsg('assistant','Connection error. Please try again in a moment.')}finally{isLoading=false;document.getElementById('sendBtn').disabled=false;document.getElementById('inputBox').focus()}}
</script>
</body>
</html>

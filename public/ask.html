<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask Jesus</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0A0806;
  --text: #FAF0DC;
  --gold: #D4AF55;
  --muted: #C8B89A;
  --dim: #8B7F6E;
  --dark-gold: #6B5A3E;
  --deep: #4A4235;
}

body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'EB Garamond', Garamond, serif;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(212,175,85,0.2); border-radius: 3px; }

@keyframes breathe {
  0%, 100% { transform: scale(1); opacity: 0.85; }
  50% { transform: scale(1.03); opacity: 1; }
}
@keyframes innerGlow {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.8; }
}
@keyframes dotPulse {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
  40% { transform: scale(1); opacity: 1; }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes grainShift {
  0%, 100% { transform: translate(0, 0); }
  10% { transform: translate(-2%, -2%); }
  30% { transform: translate(1%, 3%); }
  50% { transform: translate(-3%, 1%); }
  70% { transform: translate(3%, -1%); }
  90% { transform: translate(1%, 2%); }
}

.grain {
  position: fixed; inset: -50%; width: 200%; height: 200%;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 50;
  animation: grainShift 8s steps(10) infinite;
}

.ambient {
  position: fixed; top: -20%; left: 50%; transform: translateX(-50%);
  width: 800px; height: 800px;
  background: radial-gradient(ellipse, rgba(212,175,85,0.04) 0%, transparent 60%);
  pointer-events: none;
}

.container {
  min-height: 100vh; max-width: 720px; margin: 0 auto;
  padding: 40px 20px 20px;
  display: flex; flex-direction: column; align-items: center;
  position: relative; z-index: 10;
}

.shroud-wrap { position: relative; display: flex; align-items: center; justify-content: center; perspective: 800px; margin-bottom: 36px; }
.shroud-glow-1 {
  position: absolute; width: 340px; height: 440px; border-radius: 50%;
  background: radial-gradient(ellipse, rgba(212,175,85,0.15) 0%, rgba(212,175,85,0) 70%);
  animation: breathe 6s ease-in-out infinite; filter: blur(30px);
}
.shroud-glow-2 {
  position: absolute; width: 300px; height: 400px; border-radius: 50%;
  background: radial-gradient(ellipse, rgba(255,220,130,0.1) 0%, transparent 60%);
  animation: breathe 6s ease-in-out infinite 0.5s; filter: blur(20px);
}
.shroud-frame {
  position: relative; overflow: hidden; width: 260px; height: 360px; border-radius: 8px;
  animation: breathe 6s ease-in-out infinite;
  box-shadow: 0 0 60px rgba(212,175,85,0.2), 0 0 120px rgba(212,175,85,0.1), inset 0 0 60px rgba(0,0,0,0.3);
}
.shroud-frame img {
  width: 100%; height: 100%; object-fit: cover; object-position: center 15%;
  filter: sepia(0.3) contrast(1.1) brightness(0.9); mix-blend-mode: luminosity;
}
.shroud-overlay-1 {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(20,15,10,0.3) 0%, transparent 30%, transparent 70%, rgba(20,15,10,0.5) 100%);
}
.shroud-overlay-2 {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center 30%, rgba(212,175,85,0.08) 0%, transparent 60%);
  animation: innerGlow 6s ease-in-out infinite;
}

.title {
  font-family: 'Oswald', sans-serif; font-size: clamp(42px, 8vw, 64px);
  font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text); line-height: 1; margin-bottom: 8px;
}
.divider {
  width: 60px; height: 2px; margin: 12px auto 16px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.subtitle {
  font-size: 17px; color: var(--dim); font-style: italic;
  max-width: 400px; line-height: 1.6; margin-bottom: 40px; text-align: center;
}

.chips { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 30px; max-width: 500px; }
.chip {
  padding: 8px 16px; border-radius: 20px;
  border: 1px solid rgba(212,175,85,0.2); background: rgba(212,175,85,0.06);
  color: var(--muted); font-size: 13px; font-family: 'EB Garamond', serif;
  cursor: pointer; transition: all 0.3s ease; animation: fadeUp 0.8s ease-out both;
}
.chip:nth-child(1) { animation-delay: 0.3s; }
.chip:nth-child(2) { animation-delay: 0.4s; }
.chip:nth-child(3) { animation-delay: 0.5s; }
.chip:nth-child(4) { animation-delay: 0.6s; }
.chip:hover { background: rgba(212,175,85,0.15); border-color: rgba(212,175,85,0.4); color: var(--text); }

.chat-header {
  display: flex; align-items: center; gap: 12px; width: 100%;
  padding: 0 0 16px; border-bottom: 1px solid rgba(212,175,85,0.1); margin-bottom: 16px;
}
.chat-icon {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, #3D3425, #2A2318);
  border: 1px solid rgba(212,175,85,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--gold); font-family: 'Oswald', sans-serif; font-weight: 600;
}
.chat-title {
  font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--text);
}
.chat-subtitle { font-size: 11px; color: #6B5F4E; }
.new-btn {
  margin-left: auto; padding: 6px 12px; border-radius: 6px;
  border: 1px solid rgba(212,175,85,0.15); background: transparent;
  color: var(--dim); font-size: 11px; font-family: 'Oswald', sans-serif;
  letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
  transition: all 0.3s ease;
}
.new-btn:hover { border-color: rgba(212,175,85,0.3); color: var(--muted); }

.messages { width: 100%; flex: 1; overflow-y: auto; padding-bottom: 8px; }
.msg { display: flex; margin-bottom: 16px; animation: fadeUp 0.4s ease-out; }
.msg.user { justify-content: flex-end; }
.msg.assistant { justify-content: flex-start; }
.msg-bubble {
  max-width: 85%; padding: 14px 18px; font-size: 15px;
  line-height: 1.65; letter-spacing: 0.01em; white-space: pre-wrap;
}
.msg.user .msg-bubble {
  border-radius: 18px 18px 4px 18px;
  background: linear-gradient(135deg, #8B7355, #6B5A3E);
  color: var(--text);
}
.msg.assistant .msg-bubble {
  border-radius: 18px 18px 18px 4px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(212,175,85,0.12);
  color: var(--muted);
}
.msg-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em;
  color: var(--gold); margin-bottom: 6px; font-family: 'Oswald', sans-serif;
}

.typing-dots { display: flex; gap: 6px; align-items: center; padding: 8px 0; }
.typing-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--gold);
}
.typing-dot:nth-child(1) { animation: dotPulse 1.4s ease-in-out infinite 0s; }
.typing-dot:nth-child(2) { animation: dotPulse 1.4s ease-in-out infinite 0.2s; }
.typing-dot:nth-child(3) { animation: dotPulse 1.4s ease-in-out infinite 0.4s; }

.input-area {
  width: 100%; position: sticky; bottom: 0; padding-top: 12px;
  background: linear-gradient(0deg, var(--bg) 80%, transparent);
}
.input-wrap {
  display: flex; align-items: flex-end; gap: 8px;
  padding: 12px 16px; border-radius: 16px;
  border: 1px solid rgba(212,175,85,0.15); background: rgba(255,255,255,0.03);
  transition: border-color 0.3s ease;
}
.input-wrap:focus-within { border-color: rgba(212,175,85,0.35); }
.input-wrap textarea {
  flex: 1; background: transparent; border: none; color: var(--text);
  font-size: 15px; font-family: 'EB Garamond', serif; resize: none;
  line-height: 1.5; max-height: 120px; overflow-y: auto; outline: none;
}
.input-wrap textarea::placeholder { color: rgba(200,184,154,0.4); }
.send-btn {
  width: 38px; height: 38px; border-radius: 10px; border: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0; cursor: pointer; transition: all 0.3s ease;
  background: linear-gradient(135deg, var(--gold), #8B7355); color: var(--bg);
}
.send-btn:disabled { background: rgba(212,175,85,0.1); color: #6B5F4E; cursor: default; }
.disclaimer {
  text-align: center; font-size: 10px; color: var(--deep); margin-top: 8px;
  font-family: 'Oswald', sans-serif; letter-spacing: 0.08em; text-transform: uppercase;
}
.back-link {
  position: fixed; top: 16px; left: 16px; z-index: 60;
  font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--dim); text-decoration: none;
  transition: color 0.3s;
}
.back-link:hover { color: var(--gold); }

.hero { animation: fadeUp 1s ease-out; text-align: center; display: flex; flex-direction: column; align-items: center; }
.hidden { display: none; }
</style>
</head>
<body>
<div class="grain"></div>
<div class="ambient"></div>
<a href="/" class="back-link">&larr; Every Rock</a>

<div class="container">
  <div id="hero" class="hero">
    <div class="shroud-wrap">
      <div class="shroud-glow-1"></div>
      <div class="shroud-glow-2"></div>
      <div class="shroud-frame">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Turin_shroud_positive_and_negative_displaying_original_color_information_708_x_465_pixels.jpg" alt="Shroud of Turin">
        <div class="shroud-overlay-1"></div>
        <div class="shroud-overlay-2"></div>
      </div>
    </div>
    <h1 class="title">ASK JESUS</h1>
    <div class="divider"></div>
    <p class="subtitle">"Ask, and it shall be given you; seek, and ye shall find; knock, and it shall be opened unto you." &mdash; Matthew 7:7</p>
    <div class="chips">
      <button class="chip" onclick="useSuggestion(this)">What did Jesus say about fear?</button>
      <button class="chip" onclick="useSuggestion(this)">Is there life after death?</button>
      <button class="chip" onclick="useSuggestion(this)">What is the meaning of suffering?</button>
      <button class="chip" onclick="useSuggestion(this)">How do I forgive someone who hurt me?</button>
    </div>
  </div>

  <div id="chatHeader" class="chat-header hidden">
    <div class="chat-icon">&#10013;</div>
    <div>
      <div class="chat-title">Ask Jesus</div>
      <div class="chat-subtitle">Answering from Scripture</div>
    </div>
    <button class="new-btn" onclick="resetChat()">New Question</button>
  </div>

  <div id="messages" class="messages hidden"></div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="inputBox" rows="1" placeholder="Ask anything..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#8593;</button>
    </div>
    <div class="disclaimer">All answers sourced from Scripture &middot; Not a replacement for prayer, church, or the Holy Spirit</div>
  </div>
</div>

<script>
const SYSTEM = `You are a biblical answer engine called "Ask Jesus." Your purpose is to answer every question using the words and teachings of the Bible.

GUIDELINES:
1. When Jesus directly addressed the topic, lead with His exact words (cite book, chapter, verse).
2. When Jesus didn't directly address it, draw from the full counsel of Scripture — Old Testament, Epistles, Prophets, Psalms — and say so honestly: "Jesus did not speak to this directly, but Scripture says..."
3. Always cite chapter and verse for every claim.
4. Never invent quotes. Never paraphrase and present it as a direct quote.
5. Speak with authority and warmth — not religious jargon. Be direct, bold, and clear.
6. Keep answers concise but complete. 2-4 paragraphs max unless the question demands more.
7. If a question is hostile or mocking, respond with grace but do not shrink back.
8. Do not hedge with modern therapeutic language. Speak biblically.
9. When multiple scriptures apply, weave them together to show the coherence of the biblical witness.
10. You may acknowledge genuine theological disagreements among Christians where they exist, but always ground your answer in what the text actually says.

TONE: Bold. Grounded. Unflinching. Compassionate. Like a friend who loves you enough to tell you the truth.

FORMAT: Use the verse references inline naturally. Do not use bullet points or numbered lists. Write in flowing prose.`;

let chatMessages = [];
let isLoading = false;

function useSuggestion(el) {
  document.getElementById('inputBox').value = el.textContent;
  sendMessage();
}

function resetChat() {
  chatMessages = [];
  document.getElementById('hero').classList.remove('hidden');
  document.getElementById('chatHeader').classList.add('hidden');
  document.getElementById('messages').classList.add('hidden');
  document.getElementById('messages').innerHTML = '';
}

function addMsg(role, content) {
  const container = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (role === 'assistant') {
    bubble.innerHTML = '<div class="msg-label">Scripture says</div>' + escapeHtml(content);
  } else {
    bubble.textContent = content;
  }
  wrap.appendChild(bubble);
  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;
  return bubble;
}

function addTyping() {
  const container = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg assistant';
  wrap.id = 'typingMsg';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = '<div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  wrap.appendChild(bubble);
  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingMsg');
  if (el) el.remove();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML.replace(/\n/g, '<br>');
}

async function sendMessage() {
  const input = document.getElementById('inputBox');
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  document.getElementById('hero').classList.add('hidden');
  document.getElementById('chatHeader').classList.remove('hidden');
  document.getElementById('messages').classList.remove('hidden');

  addMsg('user', text);
  chatMessages.push({ role: 'user', content: text });
  addTyping();

  try {
    const res = await fetch('/api/ask-jesus', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: chatMessages })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || data.response || data.reply || 'I could not find an answer. Please try again.';
    removeTyping();
    addMsg('assistant', reply);
    chatMessages.push({ role: 'assistant', content: reply });
  } catch (err) {
    removeTyping();
    addMsg('assistant', 'Connection error. Please try again in a moment.');
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('inputBox').focus();
  }
}
</script>
</body>
</html>
